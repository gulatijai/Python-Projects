{% extends "base.html" %}
{% from 'bootstrap5/form.html' import render_form %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <h2 class="fw-bold text-center mb-4">Update Coffee Price</h2>
                <div class="card shadow-sm p-4">
                    <div class="mb-3 text-center">
                        <h5 class="text-muted">{{ cafe.name }}</h5>
                        <p>Current Price: <strong>{{ cafe.coffee_price }}</strong></p>
                    </div>
                    {{ render_form(form, action="/update_price/" + cafe.id|string) }}
                    <div class="text-center mt-3">
                        <a href="/cafes" class="btn btn-outline-dark">Cancel</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
