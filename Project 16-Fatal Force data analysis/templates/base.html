<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Police Shootings Analysis{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script src="https://cdn.plot.ly/plotly-3.0.0.min.js"></script>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">🚔 Police Shootings Analysis</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="/race">Race Analysis</a></li>
                <li class="nav-item"><a class="nav-link" href="/state">State Analysis</a></li>
                <li class="nav-item"><a class="nav-link" href="/trends">Trends</a></li>
                <li class="nav-item"><a class="nav-link" href="/demographics">Demographics</a></li>
            </ul>
        </div>
    </div>
</nav>

{% block content %}
{% endblock %}

<footer class="bg-dark text-white text-center py-4 mt-5">
    <p class="mb-0">📊 Data Source: Washington Post & US Census Bureau</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
