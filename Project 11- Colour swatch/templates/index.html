{% extends "base.html" %}

{% block title %}Upload Image{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6 text-center">
                <h1 class="display-5 fw-bold mb-3">🎨 Color Extractor</h1>
                <p class="lead text-muted mb-5">Upload an image and discover its top 10 most common colors.</p>
                <div class="card bg-secondary shadow-sm p-4">
                    <form method="POST" action="/analyze" enctype="multipart/form-data">
                        <div class="mb-4">
                            <input type="file" name="file" accept="image/*" class="form-control bg-dark text-white border-secondary">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-light btn-lg">🔍 Extract Colors</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
